version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: datagen-postgres
    environment:
      - POSTGRES_DB=thelook_db
      - POSTGRES_USER=db_user
      - POSTGRES_PASSWORD=db_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U db_user -d thelook_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
