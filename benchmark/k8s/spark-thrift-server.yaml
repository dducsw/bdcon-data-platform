apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-thrift-server
  namespace: data-platform
  labels:
    app: spark-thrift-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark-thrift-server
  template:
    metadata:
      labels:
        app: spark-thrift-server
    spec:
      serviceAccountName: spark-driver # Reuse spark service account
      containers:
        - name: thrift-server
          image: apache/spark:3.5.0
          imagePullPolicy: IfNotPresent
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: spark-minio-secret
                  key: MINIO_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: spark-minio-secret
                  key: MINIO_SECRET_KEY
          command:
            - "/bin/sh"
            - "-c"
            - |
              /opt/spark/bin/spark-submit \
              --class org.apache.spark.sql.hive.thriftserver.HiveThriftServer2 \
              --name "Spark Thrift Server" \
              --master "local[4]" \
              --driver-memory 4g \
              --conf "spark.jars.ivy=/tmp/.ivy2" \
              --conf "spark.hive.server2.thrift.bind.host=0.0.0.0" \
              --packages "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.4.2,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262" \
              --conf "spark.sql.extensions=org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions" \
              --conf "spark.sql.catalog.spark_catalog=org.apache.iceberg.spark.SparkSessionCatalog" \
              --conf "spark.sql.catalog.spark_catalog.type=hive" \
              --conf "spark.sql.catalog.iceberg_hive=org.apache.iceberg.spark.SparkCatalog" \
              --conf "spark.sql.catalog.iceberg_hive.type=hive" \
              --conf "spark.sql.catalog.iceberg_hive.uri=thrift://hive-metastore:9083" \
              --conf "spark.sql.catalog.iceberg_hive.warehouse=s3a://iceberg/lakehouse" \
              --conf "spark.hadoop.fs.s3a.endpoint=http://minio:9000" \
              --conf "spark.hadoop.fs.s3a.path.style.access=true" \
              --conf "spark.hadoop.fs.s3a.connection.ssl.enabled=false" \
              --conf "spark.hadoop.fs.s3a.impl=org.apache.hadoop.fs.s3a.S3AFileSystem" \
              --conf "spark.hadoop.fs.s3a.aws.credentials.provider=org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider" \
              --conf "spark.hadoop.fs.s3a.fast.upload=true" \
              --conf "spark.hadoop.fs.s3a.connection.timeout=30000" \
              --conf "spark.hadoop.fs.s3a.attempts.maximum=3" \
              --conf "spark.hadoop.fs.s3a.committer.name=magic" \
              --conf "spark.hadoop.fs.s3a.committer.magic.enabled=true" \
              --conf "spark.sql.sources.commitProtocolClass=org.apache.spark.internal.io.cloud.PathOutputCommitProtocol" \
              --conf "spark.sql.parquet.output.committer.class=org.apache.spark.internal.io.cloud.BindingParquetOutputCommitter" \
              --conf "spark.sql.catalogImplementation=hive" \
              --conf "spark.hadoop.hive.metastore.uris=thrift://hive-metastore:9083"
          ports:
            - containerPort: 10000
              name: jdbc
            - containerPort: 4040
              name: ui
---
apiVersion: v1
kind: Service
metadata:
  name: spark-thrift-server
  namespace: data-platform
spec:
  ports:
    - port: 10000
      targetPort: 10000
      name: jdbc
    - port: 4040
      targetPort: 4040
      name: ui
  selector:
    app: spark-thrift-server
