    metadata:
      labels:
        app: kafka-exporter
    spec:
      containers:
      - args:
        - --kafka.server=data-platform-kafka-bootstrap.data-platform.svc:9092
        image: danielqsj/kafka-exporter:latest
        name: kafka-exporter
        ports:
        - containerPort: 9308
          name: metrics
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
      nodeSelector:
        role: compute
      tolerations:
      - effect: NoSchedule
        key: cloud.google.com/gke-spot
        operator: Equal
        value: "true"
---
apiVersion: apps/v1
