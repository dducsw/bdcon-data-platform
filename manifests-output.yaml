apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: gravitino
  name: gravitino
  namespace: data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gravitino
  template:
    metadata:
      labels:
        app: gravitino
    spec:
      containers:
      - env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              key: MINIO_ACCESS_KEY
              name: spark-minio-secret
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: MINIO_SECRET_KEY
              name: spark-minio-secret
        image: REGISTRY/gravitino:1.1.0
        livenessProbe:
          httpGet:
            path: /api/version
            port: 8090
          periodSeconds: 20
        name: gravitino
        ports:
        - containerPort: 8090
          name: web
        - containerPort: 9001
          name: iceberg-rest
        readinessProbe:
          failureThreshold: 6
          httpGet:
            path: /api/version
            port: 8090
          periodSeconds: 10
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: 500m
            memory: 2Gi
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: /api/version
            port: 8090
          periodSeconds: 10
        volumeMounts:
        - mountPath: /tmp/conf
          name: config-rendered
      initContainers:
      - command:
        - sh
        - -c
        - |
          until nc -z postgres 5432; do
            echo "Waiting for PostgreSQL..."; sleep 3;
          done
        image: busybox:1.36
        name: wait-for-postgres
      - command:
        - sh
        - -c
        - |
          until wget -q -O- http://minio:9000/minio/health/ready; do
            echo "Waiting for MinIO..."; sleep 5;
          done
        image: busybox:1.36
        name: wait-for-minio
      - command:
        - sh
        - -c
        - |
          cp /tmp/conf-template/gravitino.conf.template /tmp/conf/gravitino.conf
          sed -i "s|__POSTGRES_USER__|$POSTGRES_USER|g" /tmp/conf/gravitino.conf
          sed -i "s|__POSTGRES_PASSWORD__|$POSTGRES_PASSWORD|g" /tmp/conf/gravitino.conf
          sed -i "s|__MINIO_ACCESS_KEY__|$MINIO_ACCESS_KEY|g" /tmp/conf/gravitino.conf
          sed -i "s|__MINIO_SECRET_KEY__|$MINIO_SECRET_KEY|g" /tmp/conf/gravitino.conf
          cp /tmp/conf-template/core-site.xml /tmp/conf/core-site.xml
          echo "Config rendered successfully."
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_USER
              name: postgres-secret
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: postgres-secret
        - name: MINIO_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: MINIO_ACCESS_KEY
              name: spark-minio-secret
        - name: MINIO_SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: MINIO_SECRET_KEY
              name: spark-minio-secret
        image: busybox:1.36
        name: render-config
        volumeMounts:
        - mountPath: /tmp/conf-template
          name: config-template
        - mountPath: /tmp/conf
          name: config-rendered
      nodeSelector:
        role: infra
      volumes:
      - configMap:
          name: gravitino-configmap
        name: config-template
      - emptyDir: {}
        name: config-rendered
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: kafka-exporter
  name: kafka-exporter
  namespace: data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-exporter
