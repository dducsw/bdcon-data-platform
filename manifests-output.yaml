          name: metrics
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 64Mi
      nodeSelector:
        role: compute
      tolerations:
      - effect: NoSchedule
        key: cloud.google.com/gke-spot
        operator: Equal
        value: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: superset
  name: superset
  namespace: data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: superset
  template:
    metadata:
      labels:
        app: superset
    spec:
      containers:
      - command:
        - /bin/bash
        - /app/init.sh
        env:
        - name: SUPERSET_SECRET_KEY
          valueFrom:
            secretKeyRef:
              key: SUPERSET_SECRET_KEY
              name: superset-secret
        - name: PYTHONPATH
          value: /usr/local/lib/python3.10/site-packages
        image: REGISTRY/superset:latest
        livenessProbe:
          httpGet:
            path: /health
            port: 8088
          initialDelaySeconds: 60
          periodSeconds: 20
        name: superset
        ports:
        - containerPort: 8088
        readinessProbe:
          failureThreshold: 10
          httpGet:
            path: /health
            port: 8088
          initialDelaySeconds: 30
          periodSeconds: 10
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: 500m
            memory: 1Gi
        startupProbe:
          failureThreshold: 30
          httpGet:
            path: /health
            port: 8088
          periodSeconds: 10
        volumeMounts:
        - mountPath: /app/superset_home
          name: superset-data
      nodeSelector:
        role: query
      tolerations:
      - effect: NoSchedule
        key: cloud.google.com/gke-spot
        operator: Equal
        value: "true"
      volumes:
      - name: superset-data
        persistentVolumeClaim:
          claimName: superset-pvc
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  labels:
    app: hive-metastore
  name: hive-metastore
  namespace: data-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hive-metastore
  serviceName: hive-metastore
  template:
    metadata:
      labels:
        app: hive-metastore
    spec:
      containers:
      - env:
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              key: MINIO_ACCESS_KEY
              name: spark-minio-secret
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              key: MINIO_SECRET_KEY
              name: spark-minio-secret
        image: REGISTRY/hive-metastore:3.1.2
        livenessProbe:
          periodSeconds: 20
          tcpSocket:
            port: 9083
        name: hive-metastore
        ports:
        - containerPort: 9083
          name: thrift
        readinessProbe:
          failureThreshold: 6
          periodSeconds: 10
          tcpSocket:
            port: 9083
        resources:
          limits:
            cpu: "2"
            memory: 3Gi
          requests:
            cpu: 500m
            memory: 1Gi
        startupProbe:
          failureThreshold: 30
          periodSeconds: 10
          tcpSocket:
            port: 9083
        volumeMounts:
        - mountPath: /opt/hive/conf/hive-site.xml
          name: config-rendered
          subPath: hive-site.xml
      initContainers:
      - command:
        - sh
        - -c
        - |
          until nc -z postgres 5432; do
            echo "Waiting for PostgreSQL..."; sleep 3;
          done
        image: busybox:1.36
        name: wait-for-postgres
      - command:
        - sh
        - -c
        - |
          until wget -q -O- http://minio:9000/minio/health/ready; do
            echo "Waiting for MinIO..."; sleep 5;
          done
        image: busybox:1.36
        name: wait-for-minio
      - command:
        - sh
        - -c
        - |
          cp /tmp/conf-template/hive-site.xml.template /tmp/conf/hive-site.xml
          sed -i "s|__POSTGRES_USER__|$POSTGRES_USER|g" /tmp/conf/hive-site.xml
          sed -i "s|__POSTGRES_PASSWORD__|$POSTGRES_PASSWORD|g" /tmp/conf/hive-site.xml
          echo "hive-site.xml rendered successfully."
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              key: POSTGRES_USER
              name: postgres-secret
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              key: POSTGRES_PASSWORD
              name: postgres-secret
        image: busybox:1.36
        name: render-config
        volumeMounts:
        - mountPath: /tmp/conf-template
          name: config-template
        - mountPath: /tmp/conf
