apiVersion: batch/v1
kind: Job
metadata:
  name: minio-bucket-setup
  namespace: data-platform
spec:
  template:
    spec:
      containers:
      - command:
        - /bin/sh
        - -c
        - |
          mc alias set myminio http://minio:9000 $MINIO_ROOT_USER $MINIO_ROOT_PASSWORD
          mc mb myminio/iceberg --ignore-existing
          mc mb myminio/iceberg/lakehouse --ignore-existing
          mc anonymous set public myminio/iceberg/lakehouse
          echo "MinIO bucket setup complete!"
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              key: MINIO_ROOT_USER
              name: minio-secret
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              key: MINIO_ROOT_PASSWORD
              name: minio-secret
        image: minio/mc:RELEASE.2025-08-13T08-35-41Z
        name: minio-client
      initContainers:
      - command:
        - sh
        - -c
        - |
          until wget -q -O- http://minio:9000/minio/health/ready; do
            echo "Waiting for MinIO..."; sleep 5;
          done
        image: busybox:1.36
        name: wait-for-minio
      restartPolicy: OnFailure
