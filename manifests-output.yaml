apiVersion: v1
kind: Namespace
metadata:
  labels:
    app.kubernetes.io/part-of: data-platform
  name: data-platform
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: data-platform-quota
  namespace: data-platform
spec:
  hard:
    limits.cpu: "48"
    limits.memory: 128Gi
    persistentvolumeclaims: "30"
    pods: "100"
    requests.cpu: "24"
    requests.memory: 80Gi
---
allowVolumeExpansion: true
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: balanced-rwo
parameters:
  type: pd-balanced
provisioner: pd.csi.storage.gke.io
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
---
apiVersion: v1
kind: ServiceAccount
metadata:
  annotations:
    iam.gke.io/gcp-service-account: eso-sa@PROJECT_ID.iam.gserviceaccount.com
  name: eso-sa
  namespace: data-platform
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: spark-driver
  namespace: data-platform
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: spark-driver-role
  namespace: data-platform
rules:
- apiGroups:
  - ""
  - extensions
  - apps
  resources:
  - pods
  - services
  - configmaps
  - persistentvolumeclaims
  verbs:
  - get
  - list
  - watch
  - create
  - delete
  - update
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: spark-driver-role-binding
  namespace: data-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: spark-driver-role
subjects:
- kind: ServiceAccount
  name: spark-driver
  namespace: data-platform
---
apiVersion: v1
data:
  core-site.xml: |
    <configuration>
      <property>
        <name>fs.s3a.impl</name>
        <value>org.apache.hadoop.fs.s3a.S3AFileSystem</value>
      </property>
      <property>
        <name>fs.s3a.endpoint</name>
        <value>http://minio:9000</value>
      </property>
      <property>
        <name>fs.s3a.aws.credentials.provider</name>
        <value>org.apache.hadoop.fs.s3a.EnvironmentVariableCredentialsProvider</value>
      </property>
      <property>
        <name>fs.s3a.path.style.access</name>
        <value>true</value>
      </property>
      <property>
        <name>fs.s3a.connection.ssl.enabled</name>
        <value>false</value>
      </property>
    </configuration>
  gravitino.conf.template: |
    gravitino.auxService.names=iceberg-rest
    gravitino.iceberg-rest.classpath=iceberg-rest-server/libs, iceberg-rest-server/conf

    gravitino.iceberg-rest.host = 0.0.0.0
    gravitino.iceberg-rest.httpPort = 9001

    gravitino.iceberg-rest.catalog-backend=jdbc
    gravitino.iceberg-rest.uri=jdbc:postgresql://postgres:5432/catalog_metastore_db
    gravitino.iceberg-rest.warehouse=s3a://iceberg/lakehouse
    gravitino.iceberg-rest.catalog-backend-name=jdbc
    gravitino.iceberg-rest.jdbc-user=__POSTGRES_USER__
    gravitino.iceberg-rest.jdbc-password=__POSTGRES_PASSWORD__
    gravitino.iceberg-rest.jdbc-initialize=true
    gravitino.iceberg-rest.jdbc-driver=org.postgresql.Driver

    gravitino.iceberg-rest.io-impl=org.apache.iceberg.aws.s3.S3FileIO
    gravitino.iceberg-rest.s3-endpoint=http://minio:9000
    gravitino.iceberg-rest.s3-access-key-id=__MINIO_ACCESS_KEY__
    gravitino.iceberg-rest.s3-secret-access-key=__MINIO_SECRET_KEY__
    gravitino.iceberg-rest.s3-path-style-access=true
    gravitino.iceberg-rest.client.region=us-east-1
kind: ConfigMap
metadata:
  name: gravitino-configmap
  namespace: data-platform
---
apiVersion: v1
data:
  hive-site.xml.template: |
    <?xml version="1.0" encoding="UTF-8" standalone="no"?>
    <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
    <configuration>
      <property>
        <name>javax.jdo.option.ConnectionURL</name>
        <value>jdbc:postgresql://postgres:5432/hive_metastore_db</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionDriverName</name>
        <value>org.postgresql.Driver</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionUserName</name>
        <value>__POSTGRES_USER__</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionPassword</name>
        <value>__POSTGRES_PASSWORD__</value>
      </property>
      <property>
        <name>hive.metastore.warehouse.dir</name>
        <value>s3a://iceberg/lakehouse</value>
      </property>
      <property>
        <name>fs.s3a.endpoint</name>
        <value>http://minio:9000</value>
      </property>
      <property>
        <name>fs.s3a.aws.credentials.provider</name>
        <value>org.apache.hadoop.fs.s3a.EnvironmentVariableCredentialsProvider</value>
      </property>
      <property>
        <name>fs.s3a.path.style.access</name>
        <value>true</value>
      </property>
      <property>
        <name>fs.s3a.connection.ssl.enabled</name>
        <value>false</value>
      </property>
      <property>
        <name>fs.s3a.impl</name>
        <value>org.apache.hadoop.fs.s3a.S3AFileSystem</value>
      </property>
      <property>
        <name>datanucleus.schema.autoCreateAll</name>
        <value>false</value>
      </property>
      <property>
        <name>hive.metastore.schema.verification</name>
        <value>false</value>
      </property>
      <property>
        <name>hive.metastore.uris</name>
        <value>thrift://0.0.0.0:9083</value>
      </property>
      <property>
        <name>hive.metastore.port</name>
        <value>9083</value>
      </property>
    </configuration>
kind: ConfigMap
