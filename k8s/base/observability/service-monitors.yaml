# ====================================================================
# Prometheus ServiceMonitors
# Instructs Prometheus Operator to scrape these specific services
# ====================================================================

apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: spark-monitor
  namespace: data-platform
  labels:
    release: kube-prometheus-stack # Default label Prometheus operator looks for
spec:
  selector:
    matchLabels:
      spark-role: driver  # Spark Operator driver pod label
  endpoints:
    - port: webui
      path: "/metrics/master/prometheus/"

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: trino-monitor
  namespace: data-platform
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: trino
      app.kubernetes.io/component: coordinator
  endpoints:
    - port: http
      path: "/metrics"

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: minio-monitor
  namespace: data-platform
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: minio
  endpoints:
    - port: api
      path: "/minio/v2/metrics/cluster"

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: kafka-exporter-monitor
  namespace: data-platform
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: kafka-exporter
  endpoints:
    - port: metrics
      path: "/metrics"

---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: redis-exporter-monitor
  namespace: data-platform
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      app: redis-exporter
  endpoints:
    - port: metrics
      path: "/metrics"
