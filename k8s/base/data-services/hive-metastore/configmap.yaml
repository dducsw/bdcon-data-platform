apiVersion: v1
kind: ConfigMap
metadata:
  name: hive-metastore-configmap
  namespace: data-platform
data:
  hive-site.xml.template: |
    <?xml version="1.0" encoding="UTF-8" standalone="no"?>
    <?xml-stylesheet type="text/xsl" href="configuration.xsl"?>
    <configuration>
      <property>
        <name>javax.jdo.option.ConnectionURL</name>
        <value>jdbc:postgresql://postgres:5432/hive_metastore_db</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionDriverName</name>
        <value>org.postgresql.Driver</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionUserName</name>
        <value>__POSTGRES_USER__</value>
      </property>
      <property>
        <name>javax.jdo.option.ConnectionPassword</name>
        <value>__POSTGRES_PASSWORD__</value>
      </property>
      <property>
        <name>hive.metastore.warehouse.dir</name>
        <value>s3a://iceberg/lakehouse</value>
      </property>
      <property>
        <name>fs.s3a.endpoint</name>
        <value>http://minio:9000</value>
      </property>
      <property>
        <name>fs.s3a.path.style.access</name>
        <value>true</value>
      </property>
      <property>
        <name>fs.s3a.connection.ssl.enabled</name>
        <value>false</value>
      </property>
      <property>
        <name>fs.s3a.impl</name>
        <value>org.apache.hadoop.fs.s3a.S3AFileSystem</value>
      </property>
      <property>
        <name>fs.s3a.access.key</name>
        <value>minioadmin</value>
      </property>
      <property>
        <name>fs.s3a.secret.key</name>
        <value>minioadmin</value>
      </property>
      <property>
        <name>fs.s3a.aws.credentials.provider</name>
        <value>org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider</value>
      </property>
      <!-- Fast upload: tránh buffer disk staging gây hang khi ghi -->
      <property>
        <name>fs.s3a.fast.upload</name>
        <value>true</value>
      </property>
      <!-- Connection timeouts: fail fast thay vì hang mãi -->
      <property>
        <name>fs.s3a.connection.timeout</name>
        <value>30000</value>
      </property>
      <property>
        <name>fs.s3a.connection.establish.timeout</name>
        <value>5000</value>
      </property>
      <property>
        <name>fs.s3a.attempts.maximum</name>
        <value>3</value>
      </property>
      <property>
        <name>datanucleus.schema.autoCreateAll</name>
        <value>false</value>
      </property>
      <property>
        <name>hive.metastore.schema.verification</name>
        <value>false</value>
      </property>

      <property>
        <name>hive.metastore.uris</name>
        <value>thrift://0.0.0.0:9083</value>
      </property>
      <property>
        <name>hive.metastore.port</name>
        <value>9083</value>
      </property>
    </configuration>
