apiVersion: v1
kind: Service
metadata:
  name: minio-headless
  namespace: data-platform
  labels:
    app: minio
spec:
  type: ClusterIP
  clusterIP: None
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
