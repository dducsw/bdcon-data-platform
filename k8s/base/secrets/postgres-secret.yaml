# ====================================================================
# ExternalSecret — PostgreSQL Credentials
# Replaces the old plain Secret postgres-secret.yaml.
# ESO will create a K8s Secret named "postgres-secret".
#
# GCP Secrets to create beforehand:
#   gcloud secrets create postgres-user --data-file=- <<< "postgres"
#   gcloud secrets create postgres-password --data-file=- <<< "CHANGE-ME-strong-password"
#   gcloud secrets create postgres-db --data-file=- <<< "catalog_metastore_db"
# ====================================================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: postgres-secret
  namespace: data-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: postgres-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        POSTGRES_USER: '{{ .POSTGRES_USER | trim }}'
        POSTGRES_PASSWORD: '{{ .POSTGRES_PASSWORD | trim }}'
        POSTGRES_DB: '{{ .POSTGRES_DB | trim }}'
        connection: 'postgresql://{{ .POSTGRES_USER | trim }}:{{ .POSTGRES_PASSWORD | trim }}@postgres:5432/{{ .POSTGRES_DB | trim }}'
  data:
    - secretKey: POSTGRES_USER
      remoteRef:
        key: postgres-user
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: postgres-password
    - secretKey: POSTGRES_DB
      remoteRef:
        key: postgres-db
