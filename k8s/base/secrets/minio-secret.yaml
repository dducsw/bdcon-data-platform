# ====================================================================
# ExternalSecret — MinIO Credentials
# Replaces the old plain Secret minio-secret.yaml.
# ESO will create a K8s Secret named "minio-secret" by pulling values
# from GCP Secret Manager. All pods that reference "minio-secret" work unchanged.
#
# GCP Secrets to create beforehand (replace values accordingly):
#   gcloud secrets create minio-root-user --data-file=- <<< "minioadmin"
#   gcloud secrets create minio-root-password --data-file=- <<< "CHANGE-ME-strong-password"
# ====================================================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-secret
  namespace: data-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: minio-secret   # Name of the K8s Secret to create
    creationPolicy: Owner
  data:
    - secretKey: MINIO_ROOT_USER
      remoteRef:
        key: minio-root-user
    - secretKey: MINIO_ROOT_PASSWORD
      remoteRef:
        key: minio-root-password
