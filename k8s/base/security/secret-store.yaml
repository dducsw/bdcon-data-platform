# ====================================================================
# External Secrets Operator — ClusterSecretStore (Fixed v1)
# ====================================================================
---
apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: gcp-secret-manager
spec:
  provider:
    gcpsm:
      projectID: "k8s-data-platform-1879"
      auth:
        workloadIdentity:
          clusterLocation: "asia-east1-a"
          clusterName: "data-platform-cluster"
          clusterProjectID: "k8s-data-platform-1879"
          serviceAccountRef:
            name: external-secrets
            namespace: external-secrets
