# ====================================================================
# Cilium Ingress Routing Rules
# Maps subdomains to specific ClusterIP services in K8s
# Requires: Cilium Ingress Controller installed via Helm
# ====================================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: data-platform-ingress
  namespace: data-platform
spec:
  ingressClassName: cilium
  rules:
    # Trino UI
    - host: trino.data.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: trino
                port:
                  number: 8080
    
    # Superset UI
    - host: superset.data.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: superset
                port:
                  number: 8088

    # Grafana Dashboard (from Kube-Prometheus-Stack)
    - host: grafana.data.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80

    # Airflow Webserver
    - host: airflow.data.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: airflow-webserver
                port:
                  number: 8080
