# ====================================================================
# Hive Metastore StatefulSet — node-1 (infra, On-demand)
# Thrift Metastore on port 9083
# Depends on: postgres, minio
# Init container renders hive-site.xml template with secrets.
# ====================================================================
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: hive-metastore
  namespace: data-platform
  labels:
    app: hive-metastore
spec:
  serviceName: hive-metastore
  replicas: 1
  selector:
    matchLabels:
      app: hive-metastore
  template:
    metadata:
      labels:
        app: hive-metastore
    spec:
      nodeSelector:
        role: infra
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432; do
                echo "Waiting for PostgreSQL..."; sleep 3;
              done
        - name: wait-for-minio
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until wget -q -O- http://minio:9000/minio/health/ready; do
                echo "Waiting for MinIO..."; sleep 5;
              done
        # Render hive-site.xml template with actual credentials
        - name: render-config
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              cp /tmp/conf-template/hive-site.xml.template /tmp/conf/hive-site.xml
              sed -i "s|__POSTGRES_USER__|$POSTGRES_USER|g" /tmp/conf/hive-site.xml
              sed -i "s|__POSTGRES_PASSWORD__|$POSTGRES_PASSWORD|g" /tmp/conf/hive-site.xml
              echo "hive-site.xml rendered successfully."
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: config-template
              mountPath: /tmp/conf-template
            - name: config-rendered
              mountPath: /tmp/conf
      containers:
        - name: hive-metastore
          image: apache/hive:3.1.3   # Official Apache image as requested
          command:
            - /bin/bash
            - -c
            - |
              /opt/hive/bin/hive --service metastore
          ports:
            - name: thrift
              containerPort: 9083
          env:
            - name: HADOOP_CLASSPATH
              value: "/opt/hadoop/share/hadoop/tools/lib/*"
            - name: SKIP_SCHEMA_INIT
              value: "true"
            - name: DB_DRIVER
              value: "postgres"
            - name: SERVICE_NAME
              value: "metastore"
            # For EnvironmentVariableCredentialsProvider (S3A)
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: spark-minio-secret
                  key: MINIO_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: spark-minio-secret
                  key: MINIO_SECRET_KEY
          volumeMounts:
            - name: config-rendered
              mountPath: /opt/hive/conf/hive-site.xml
              subPath: hive-site.xml
          startupProbe:
            tcpSocket:
              port: 9083
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 9083
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 9083
            periodSeconds: 20
          resources:
            requests:
              cpu: "200m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "3Gi"
      volumes:
        - name: config-template
          configMap:
            name: hive-metastore-configmap
        - name: config-rendered
          emptyDir: {}
