# ====================================================================
# ExternalSecret — Apache Superset Secret Key
# Creates a K8s Secret "superset-secret" mounted as env var in the
# Superset container. Required for session signing.
#
# GCP Secret to create beforehand:
#   python -c "import secrets; print(secrets.token_hex(32))" | \
#     gcloud secrets create superset-secret-key --data-file=-
# ====================================================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: superset-secret
  namespace: data-platform
spec:
  refreshInterval: 24h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: superset-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        SUPERSET_SECRET_KEY: '{{ .SUPERSET_SECRET_KEY | trim }}'
  data:
    - secretKey: SUPERSET_SECRET_KEY
      remoteRef:
        key: superset-secret-key
