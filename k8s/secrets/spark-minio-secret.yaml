# ====================================================================
# ExternalSecret — Spark MinIO Access Credentials
# Creates a K8s Secret "spark-minio-secret" mounted as env vars in
# Spark master/worker containers. The spark-defaults.conf uses
# ${env:MINIO_ACCESS_KEY} substitution to avoid hardcoding.
#
# GCP Secrets to create beforehand:
#   gcloud secrets create minio-access-key --data-file=- <<< "minioadmin"
#   gcloud secrets create minio-secret-key --data-file=- <<< "CHANGE-ME-strong-password"
# ====================================================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: spark-minio-secret
  namespace: data-platform
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: spark-minio-secret
    creationPolicy: Owner
  data:
    - secretKey: MINIO_ACCESS_KEY
      remoteRef:
        key: minio-root-user      # Reuse the same secret as MinIO root user
    - secretKey: MINIO_SECRET_KEY
      remoteRef:
        key: minio-root-password  # Reuse the same secret as MinIO root password
