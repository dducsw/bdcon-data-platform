# Kafka cluster 'data-platform-kafka' is already deployed in the cluster.
# We only need to define the KafkaTopic pointing to it.
---
apiVersion: kafka.strimzi.io/v1
kind: KafkaTopic
metadata:
  name: click-events
  namespace: data-platform
  labels:
    strimzi.io/cluster: data-platform-kafka
spec:
  partitions: 3
  replicas: 1
  config:
    retention.ms: 7200000
    segment.bytes: 1073741824


