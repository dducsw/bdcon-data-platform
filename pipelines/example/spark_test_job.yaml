# ====================================================================
# ConfigMap — Spark MinIO Test Script
# Mount vào driver/executor tại /opt/spark/work-dir/
# Tránh phụ thuộc S3A JAR khi load mainApplicationFile
# ====================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-minio-test-script
  namespace: data-platform
data:
  spark_hive_minio_test.py: |
    import os
    from pyspark.sql import SparkSession

    def main():
        MINIO_ENDPOINT = os.getenv("MINIO_ENDPOINT", "http://minio:9000")
        MINIO_ACCESS_KEY = os.getenv("AWS_ACCESS_KEY_ID", "minioadmin")
        MINIO_SECRET_KEY = os.getenv("AWS_SECRET_ACCESS_KEY", "minioadmin")
        HIVE_METASTORE_URI = os.getenv("HIVE_METASTORE_URI", "thrift://hive-metastore:9083")
        S3_BUCKET = "datalake"

        print("Initializing SparkSession...")
        spark = (
            SparkSession.builder
            .appName("Test-Spark-Hive-MinIO")
            .config("hive.metastore.uris", HIVE_METASTORE_URI)
            .config("spark.hadoop.fs.s3a.endpoint", MINIO_ENDPOINT)
            .config("spark.hadoop.fs.s3a.access.key", MINIO_ACCESS_KEY)
            .config("spark.hadoop.fs.s3a.secret.key", MINIO_SECRET_KEY)
            .config("spark.hadoop.fs.s3a.path.style.access", "true")
            .config("spark.hadoop.fs.s3a.connection.ssl.enabled", "false")
            .config("spark.hadoop.fs.s3a.impl", "org.apache.hadoop.fs.s3a.S3AFileSystem")
            .config("spark.hadoop.fs.s3a.aws.credentials.provider",
                    "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider")
            # Iceberg Config
            .config("spark.sql.extensions", "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions")
            .config("spark.sql.catalog.spark_catalog", "org.apache.iceberg.spark.SparkSessionCatalog")
            .config("spark.sql.catalog.spark_catalog.type", "hive")
            .config("spark.sql.catalog.catalog_iceberg", "org.apache.iceberg.spark.SparkCatalog")
            .config("spark.sql.catalog.catalog_iceberg.type", "hive")
            .config("spark.sql.catalog.catalog_iceberg.uri", HIVE_METASTORE_URI)
            .config("spark.sql.catalog.catalog_iceberg.warehouse", f"s3a://{S3_BUCKET}/warehouse")
            .enableHiveSupport()
            .getOrCreate()
        )
        spark.sparkContext.setLogLevel("WARN")

        try:
            print("🚀 SparkSession with Iceberg Initialized!")
            print("\n--- Test 1: Create Iceberg Database & Table ---")
            spark.sql("CREATE DATABASE IF NOT EXISTS catalog_iceberg.test_db")
            
            print("\n--- Test 2: Write Iceberg data to MinIO ---")
            data = [("Alice", 25, "Data Engineer"), 
                    ("Bob", 30, "Data Scientist"), 
                    ("Charlie", 28, "DevOps")]
            columns = ["Name", "Age", "Role"]
            df = spark.createDataFrame(data, columns)

            table_name = "catalog_iceberg.test_db.spark_iceberg_test"
            df.writeTo(table_name).createOrReplace()
            print("Write Iceberg OK!")

            print("\n--- Test 3: Read back Iceberg table ---")
            spark.sql(f"SELECT * FROM {table_name} WHERE Age > 25").show()
            print("ALL ICEBERG TESTS PASSED!")

        except Exception as e:
            print("ERROR:", str(e))
            raise
        finally:
            spark.stop()

    if __name__ == "__main__":
        main()
---
# ====================================================================
# SparkApplication — MinIO Integration Test (fixed)
#
# Fixes:
#   1. Script được mount từ ConfigMap → không cần S3A JAR để load file
#   2. Image spark:3.5.0 với hadoop-aws bundled (bitnami có hadoop-aws)
#   3. coreLimit >= driver.cores để pass LimitRange validation
#   4. AWS_ env vars inject đúng từ spark-minio-secret
#   5. hadoopConf để cấu hình S3A trực tiếp (thay vì sparkConf)
#
# Submit:  kubectl apply -f pipelines/spark_test_job.yaml
# Watch:   kubectl get sparkapplication -n data-platform -w
# Logs:    kubectl logs -n data-platform spark-minio-test-job-driver -f
# Delete:  kubectl delete -f pipelines/spark_test_job.yaml
# ====================================================================
apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: spark-minio-test-job
  namespace: data-platform
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster

  # apache/spark image has standard entrypoint for Spark operator
  image: "apache/spark:3.5.0"
  imagePullPolicy: IfNotPresent

  # Script mount từ ConfigMap → path local:/// không cần S3A để load
  mainApplicationFile: "local:///opt/spark/scripts/spark_hive_minio_test.py"

  sparkVersion: "3.5.0"

  restartPolicy:
    type: Never

  # ── Hadoop/S3A Config ────────────────────────────────────────────────
  hadoopConf:
    "fs.s3a.endpoint": "http://minio:9000"
    "fs.s3a.path.style.access": "true"
    "fs.s3a.connection.ssl.enabled": "false"
    "fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "fs.s3a.access.key": "minioadmin"
    "fs.s3a.secret.key": "minioadmin"
    "fs.s3a.aws.credentials.provider": "org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider"


  sparkConf:
    "spark.sql.warehouse.dir": "s3a://datalake/warehouse"
    "spark.sql.catalogImplementation": "hive"
    "spark.hadoop.hive.metastore.uris": "thrift://hive-metastore:9083"
    "spark.driver.extraJavaOptions": "-Dlog4j2.logger.NativeCodeLoader.level=ERROR"
    "spark.executor.extraJavaOptions": "-Dlog4j2.logger.NativeCodeLoader.level=ERROR"
    # Iceberg and S3 dependencies
    "spark.jars.packages": "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.4.2,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262"
    # Iceberg Extensions
    "spark.sql.extensions": "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    # Catalog Configuration
    "spark.sql.catalog.spark_catalog": "org.apache.iceberg.spark.SparkSessionCatalog"
    "spark.sql.catalog.spark_catalog.type": "hive"
    "spark.sql.catalog.catalog_iceberg": "org.apache.iceberg.spark.SparkCatalog"
    "spark.sql.catalog.catalog_iceberg.type": "hive"
    "spark.sql.catalog.catalog_iceberg.uri": "thrift://hive-metastore:9083"
    "spark.sql.catalog.catalog_iceberg.warehouse": "s3a://datalake/warehouse"
    # Fix Ivy cache path for Spark Operator running spark-submit
    "spark.jars.ivy": "/tmp/.ivy2"

  # ── Driver ─────────────────────────────────────────────────────────
  driver:
    cores: 1
    coreLimit: "1200m"      # >= cores (avoid LimitRange 500m default limit rejection)
    memory: "1g"
    serviceAccount: spark-driver
    labels:
      version: "3.5.0"
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: spark-minio-secret
            key: MINIO_ACCESS_KEY
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: spark-minio-secret
            key: MINIO_SECRET_KEY
    # Pod Template is more reliable for volumes when webhook is disabled
    template:
      spec:
        containers:
          - name: spark-kubernetes-driver
            volumeMounts:
              - name: script-volume
                mountPath: /opt/spark/scripts
        volumes:
          - name: script-volume
            configMap:
              name: spark-minio-test-script

  # ── Executor ────────────────────────────────────────────────────────
  executor:
    cores: 1
    coreLimit: "1200m"
    instances: 1
    memory: "1g"
    labels:
      version: "3.5.0"
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: spark-minio-secret
            key: MINIO_ACCESS_KEY
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: spark-minio-secret
            key: MINIO_SECRET_KEY
    template:
      spec:
        containers:
          - name: spark-kubernetes-executor
            volumeMounts:
              - name: script-volume
                mountPath: /opt/spark/scripts
        volumes:
          - name: script-volume
            configMap:
              name: spark-minio-test-script