apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: spark-minio-test-job
  namespace: data-platform
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: "bitnami/spark:3.5.0" # Image gốc (có thể dùng image do công ty tự build)
  imagePullPolicy: Always
  
  # Chỉ định vị trí file code đang nằm trên MinIO/S3
  mainApplicationFile: "s3a://datalake/scripts/spark_hive_minio_test.py"
  
  sparkVersion: "3.5.0"
  restartPolicy:
    type: Never

  # Cấu hình cho máy chủ điều khiển (Driver)
  driver:
    cores: 1
    memory: "512m"
    labels:
      version: 3.5.0
    serviceAccount: default
    
  # Cấu hình cho các máy con xử lý (Executor / Worker)
  executor:
    cores: 1
    instances: 1 # Chạy bằng 1 node phụ
    memory: "512m"
    labels:
      version: 3.5.0
