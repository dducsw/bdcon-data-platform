# ====================================================================
# SparkApplication — MinIO Integration Test (fixed)
#
# Fixes:
#   1. Script được tải trực tiếp từ MinIO (s3a://)
#   2. Image spark:3.5.0 với hadoop-aws bundled (bitnami có hadoop-aws)
#   3. coreLimit >= driver.cores để pass LimitRange validation
#   4. AWS_ env vars inject đúng từ spark-minio-secret
#   5. hadoopConf để cấu hình S3A trực tiếp (thay vì sparkConf)
#
# Submit:  kubectl apply -f pipelines/spark_test_job.yaml
# Watch:   kubectl get sparkapplication -n data-platform -w
# Logs:    kubectl logs -n data-platform spark-minio-test-job-driver -f
# Delete:  kubectl delete -f pipelines/spark_test_job.yaml
# ====================================================================
apiVersion: "sparkoperator.k8s.io/v1beta2"
kind: SparkApplication
metadata:
  name: spark-minio-test-job
  namespace: data-platform
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster

  # apache/spark image has standard entrypoint for Spark operator
  image: "apache/spark:3.5.0"
  imagePullPolicy: IfNotPresent

  # Script chạy được upload trên S3/MinIO
  mainApplicationFile: "s3a://datalake/scripts/spark_hive_minio_test.py"

  sparkVersion: "3.5.0"

  restartPolicy:
    type: Never

  # ── Hadoop/S3A Config ────────────────────────────────────────────────
  hadoopConf:
    "fs.s3a.endpoint": "http://minio:9000"
    "fs.s3a.path.style.access": "true"
    "fs.s3a.connection.ssl.enabled": "false"
    "fs.s3a.impl": "org.apache.hadoop.fs.s3a.S3AFileSystem"
    "fs.s3a.access.key": "minioadmin"
    "fs.s3a.secret.key": "minioadmin"

  sparkConf:
    "spark.sql.warehouse.dir": "s3a://datalake/warehouse"
    "spark.sql.catalogImplementation": "hive"
    "spark.hadoop.hive.metastore.uris": "thrift://hive-metastore:9083"
    "spark.driver.extraJavaOptions": "-Dlog4j2.logger.NativeCodeLoader.level=ERROR -Daws.region=us-east-1 -Daws.accessKeyId=minioadmin -Daws.secretAccessKey=minioadmin"
    "spark.executor.extraJavaOptions": "-Dlog4j2.logger.NativeCodeLoader.level=ERROR -Daws.region=us-east-1 -Daws.accessKeyId=minioadmin -Daws.secretAccessKey=minioadmin"
    # Download S3/MinIO dependencies and Iceberg AWS v2 bundles
    "spark.jars.packages": "org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262,org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.0,org.apache.iceberg:iceberg-aws-bundle:1.5.0"
    # Cấu hình Iceberg Catalog
    "spark.sql.extensions": "org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions"
    "spark.sql.catalog.spark_catalog": "org.apache.iceberg.spark.SparkSessionCatalog"
    "spark.sql.catalog.spark_catalog.type": "hive"
    "spark.sql.catalog.iceberg": "org.apache.iceberg.spark.SparkCatalog"
    "spark.sql.catalog.iceberg.type": "hive"
    "spark.sql.catalog.iceberg.uri": "thrift://hive-metastore:9083"
    "spark.sql.catalog.iceberg.s3.endpoint": "http://minio:9000"
    "spark.sql.catalog.iceberg.s3.region": "us-east-1"
    "spark.sql.catalog.iceberg.s3.access-key-id": "minioadmin"
    "spark.sql.catalog.iceberg.s3.secret-access-key": "minioadmin"
    "spark.sql.catalog.iceberg.s3.path-style-access": "true"
    "spark.sql.catalog.iceberg.io-impl": "org.apache.iceberg.aws.s3.S3FileIO"
    "spark.sql.catalog.iceberg.warehouse": "s3a://datalake/warehouse/iceberg"
    # Fix Ivy cache path for Spark Operator running spark-submit
    "spark.jars.ivy": "/tmp/.ivy2"

  # ── Driver ─────────────────────────────────────────────────────────
  driver:
    cores: 1
    coreLimit: "1200m"      # >= cores (avoid LimitRange 500m default limit rejection)
    memory: "1g"
    serviceAccount: spark-driver
    labels:
      version: "3.5.0"
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: spark-minio-secret
            key: MINIO_ACCESS_KEY
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: spark-minio-secret
            key: MINIO_SECRET_KEY
      - name: AWS_REGION
        value: us-east-1

  # ── Executor ────────────────────────────────────────────────────────
  executor:
    cores: 1
    coreLimit: "1200m"
    instances: 1
    memory: "1g"
    labels:
      version: "3.5.0"
    env:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: spark-minio-secret
            key: MINIO_ACCESS_KEY
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: spark-minio-secret
            key: MINIO_SECRET_KEY
      - name: AWS_REGION
        value: us-east-1