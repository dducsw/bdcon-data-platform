services:
  # Metastore DB: PostgreSQL
  postgres:
    platform: linux/amd64
    image: postgres:${POSTGRESQL_IMAGE_TAG}
    container_name: postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hive_metastore_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hive_metastore_db"]
      interval: 5s
      timeout: 60s
      retries: 5
      start_period: 20s
    networks:
      - local-data-lakehouse

  hive-metastore:
    platform: linux/amd64
    build:
      context: ./infrastructure/hive-metastore
      dockerfile: Dockerfile
      args:
        - HADOOP_VERSION=${HADOOP_VERSION}
        - HIVE_VERSION=${HIVE_VERSION}
        - POSTGRESQL_JAR_VERSION=${POSTGRESQL_JAR_VERSION}
        - AWS_JAVA_SDK_BUNDLE_JAR_VERSION=${AWS_JAVA_SDK_BUNDLE_JAR_VERSION}
    container_name: hive-metastore
    ports:
      - "9083:9083"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    networks:
      - local-data-lakehouse

  # Distributed Compute Engine: Apache Spark
  spark-master:
    platform: linux/amd64
    image: spark-image
    build:
      context: .
      dockerfile: ./infrastructure/spark/Dockerfile
      args:
        - PYTHON_VERSION=${PYTHON_VERSION}
        - SPARK_SCALA_VERSION=${SPARK_SCALA_VERSION}
        - ICEBERG_VERSION=${ICEBERG_VERSION}
        - SPARK_VERSION=${SPARK_VERSION}
        - POSTGRESQL_JAR_VERSION=${POSTGRESQL_JAR_VERSION}
        - HADOOP_AWS_JAR_VERSION=${HADOOP_AWS_JAR_VERSION}
        - AWS_JAVA_SDK_BUNDLE_JAR_VERSION=${AWS_JAVA_SDK_BUNDLE_JAR_VERSION}
        - KAFKA_VERSION=${KAFKA_VERSION}
        - SPARK_KAFKA_VERSION=${SPARK_KAFKA_VERSION}
    container_name: spark-master
    ports:
      - "8080:8080"
      - "4040:4040"
      - "7077:7077"
      - "8888:8888"
    env_file:
      - .env
      - ./infrastructure/spark/.env.spark
    volumes:
      - ./infrastructure/common:/tmp/common
      - ./infrastructure/spark/conf:/tmp/conf
      - ./pipelines:/opt/spark/apps/pipelines
      - ./setup:/opt/spark/apps/setup
      - ./infrastructure/spark/logs/:/opt/spark/spark-events
      - ./notebooks:/opt/spark/notebooks
      - ./scripts:/opt/spark/scripts
      - ./data:/opt/spark/apps/data
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_healthy
    entrypoint: ["./init/init.sh", "master"]
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080" ]
      interval: 5s
      timeout: 60s
      retries: 5
      start_period: 20s
    networks:
      - local-data-lakehouse

  spark-worker-1:
    platform: linux/amd64
    image: spark-image
    build:
      context: .
      dockerfile: ./infrastructure/spark/Dockerfile
      args:
        - PYTHON_VERSION=${PYTHON_VERSION}
        - SPARK_SCALA_VERSION=${SPARK_SCALA_VERSION}
        - ICEBERG_VERSION=${ICEBERG_VERSION}
        - SPARK_VERSION=${SPARK_VERSION}
        - POSTGRESQL_JAR_VERSION=${POSTGRESQL_JAR_VERSION}
        - HADOOP_AWS_JAR_VERSION=${HADOOP_AWS_JAR_VERSION}
        - AWS_JAVA_SDK_BUNDLE_JAR_VERSION=${AWS_JAVA_SDK_BUNDLE_JAR_VERSION}
        - KAFKA_VERSION=${KAFKA_VERSION}
        - SPARK_KAFKA_VERSION=${SPARK_KAFKA_VERSION}
    container_name: spark-worker-1
    env_file:
      - .env
      - ./infrastructure/spark/.env.spark
    volumes:
      - ./infrastructure/common:/tmp/common
      - ./infrastructure/spark/conf:/tmp/conf
      - ./pipelines:/opt/spark/apps/pipelines
      - ./infrastructure/spark/logs/:/opt/spark/spark-events
      - ./scripts:/opt/spark/scripts
      - ./data:/opt/spark/apps/data
    depends_on:
      spark-master:
        condition: service_healthy
    entrypoint: ['./init/init.sh', 'worker']
    networks:
      - local-data-lakehouse

  # Object Storage: MinIO
  minio:
    platform: linux/amd64
    image: minio/minio:${MINIO_IMAGE_TAG}
    container_name: minio
    ports:
      - "9000:9000"
      - "9002:9002"
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio_data:/data
    command: server /data --address :9000 --console-address ':9002'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 5s
      timeout: 60s
      retries: 5
      start_period: 20s
    networks:
      - local-data-lakehouse
  
  minio-client:
    platform: linux/amd64
    image: "minio/mc:${MINIO_CLIENT_IMAGE_TAG}"
    container_name: minio-client
    env_file:
      - .env
    depends_on:
      minio: 
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/iceberg --ignore-existing;
      /usr/bin/mc mb myminio/iceberg/lakehouse --ignore-existing;
      /usr/bin/mc anonymous set public myminio/iceberg/lakehouse;
      "
    networks:
      - local-data-lakehouse
    
  trino:
    platform: linux/amd64
    image: trinodb/trino:${TRINO_IMAGE_TAG}
    container_name: trino
    ports:
      - "8088:8080"
    env_file:
      - .env
    volumes:
      - ./infrastructure/trino/etc/catalog:/etc/trino/catalog
    depends_on:
      hive-metastore:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/v1/info" ]
      interval: 5s
      timeout: 60s
      retries: 5
      start_period: 20s
    networks:
      - local-data-lakehouse

  # Message Queue: Apache Kafka (Single Node KRaft)
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      # LISTENERS
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://127.0.0.1:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CLUSTER_ID=abcdefghijklmnopqrstuv
    volumes:
      - kafka_data:/tmp/kafka-logs
    networks:
      - local-data-lakehouse
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Data Visualization and Exploration: Apache Superset
  superset:
    build:
      context: ./infrastructure/superset
      dockerfile: Dockerfile
    container_name: superset
    ports:
      - "8089:8088"
    environment:
      - SUPERSET_SECRET_KEY=yoursecretkey_changeme
      - PYTHONPATH=/usr/local/lib/python3.10/site-packages
    volumes:
      - superset_data:/app/superset_home
      - ./infrastructure/superset/init.sh:/app/init.sh
    command: ["/bin/bash", "/app/init.sh"]
    networks:
      - local-data-lakehouse

networks:
  local-data-lakehouse:

volumes:
  postgres_data:
  minio_data:
  kafka_data:
  superset_data:
