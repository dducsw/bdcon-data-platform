connector.name=iceberg
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://gravitino:9001/iceberg/

# Native GCS filesystem support for Iceberg tables stored in gs:// locations.
fs.native-gcs.enabled=true
gcs.project-id=your-gcp-project-id
gcs.auth-type=SERVICE_ACCOUNT
gcs.json-key-file-path=/etc/trino/gcs/service-account.json

# Optional: set this only if you use a custom GCS-compatible endpoint.
# gcs.endpoint=https://storage.googleapis.com
